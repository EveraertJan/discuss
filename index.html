<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Discuss — Builder</title>
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/builder.css" />
</head>
<body>

  <!-- Toolbar -->
  <nav id="toolbar" role="toolbar" aria-label="Builder tools">
    <button class="btn-ghost" id="btn-new"    title="New map">New</button>
    <button class="btn-ghost" id="btn-import" title="Import JSON">Import</button>
    <button class="btn-ghost" id="btn-export" title="Export JSON">Export</button>
    <button class="btn-ghost" id="btn-add"    title="Add entry point">+ Node</button>
    <button class="btn-ghost" id="btn-fit"    title="Fit to screen (F)">Fit</button>
    <button class="btn-ghost" id="btn-layout" title="Auto-layout tree">Layout</button>
    <button class="btn-ghost" id="btn-github" title="Save / load via GitHub">GitHub</button>
    <button class="btn-ghost" id="btn-help"   title="Help (?)">?</button>
  </nav>

  <!-- Map title (editable) -->
  <div id="title-bar" style="
    position: absolute;
    top: 0;
    left: 0;
    padding: 12px 16px;
    z-index: 99;
    pointer-events: none;
  ">
    <span
      id="map-title"
      contenteditable="true"
      style="
        pointer-events: all;
        font-size: var(--text-sm);
        font-weight: var(--weight-medium);
        opacity: 0.5;
        outline: none;
        cursor: text;
        border-bottom: 1px dashed transparent;
      "
      title="Click to rename"
    >Untitled Argument</span>
  </div>

  <!-- Main area: canvas + sidebar -->
  <div id="app">
    <canvas id="canvas"></canvas>

    <!-- Empty hint -->
    <div id="empty-hint" aria-hidden="true">
      <strong>No nodes yet</strong>
      <p>Click <b>+ Node</b> to add your first argument,<br>or <b>Import</b> a saved map.</p>
    </div>

    <!-- Sidebar / bottom sheet -->
    <aside id="sidebar" aria-label="Node editor"></aside>
  </div>

  <script type="module" src="js/builder/main.js"></script>
</body>
</html>
